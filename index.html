<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stuff.london</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #F5F0E8;
    --ink:    #1A1814;
    --muted:  #6E6860;
    --orange: #f78507;
    --ff:     'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--ff);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 48px;
    gap: 0;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 32px;
    border-bottom: 1.5px solid var(--ink);
    animation: up 0.7s ease both;
  }

  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .logo em {
    font-style: normal;
    color: var(--orange);
  }

  .header-tag {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .nav-contact {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.18s;
  }
  .nav-contact:hover { color: var(--orange); }

  /* ── IMAGE GRID ── */
  .image-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
    margin-top: 40px;
    animation: up 0.7s ease 0.1s both;
  }

  .image-grid .ph {
    aspect-ratio: 3 / 4;
    overflow: hidden;
    position: relative;
  }

  /* Six distinct warm tones to suggest varied objects */
  .ph-1 { background: #C4B49A; }
  .ph-2 { background: #A89278; }
  .ph-3 { background: #BDB09C; }
  .ph-4 { background: #9C8E78; }
  .ph-5 { background: #C8BCA8; }
  .ph-6 { background: #B0A28C; }

  /* Subtle inner texture lines to suggest objects */
  .ph::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  }

  /* ── COMING SOON BLOCK ── */
  .coming-block {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 48px;
    padding: 56px 0 52px;
    border-bottom: 1.5px solid var(--ink);
    animation: up 0.7s ease 0.2s both;
  }

  h1 {
    font-size: clamp(60px, 9vw, 120px);
    font-weight: 700;
    line-height: 0.92;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  h1 .line-orange {
    color: var(--orange);
    display: block;
  }

  /* ── FORM ── */
  .signup {
    max-width: 400px;
    width: 100%;
    flex-shrink: 1;
  }

  .form-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 14px;
  }

  .form-row {
    display: flex;
    border: 1.5px solid var(--ink);
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .form-row:focus-within { border-color: var(--orange); }

  .form-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--ff);
    font-size: 15px;
    font-weight: 400;
    color: var(--ink);
    padding: 13px 16px;
    -webkit-appearance: none;
    min-width: 0;
  }

  .form-row input::placeholder { color: var(--muted); opacity: 0.6; }

  .form-row button {
    background: var(--orange);
    border: none;
    font-family: var(--ff);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
    padding: 13px 20px;
    transition: background 0.18s;
    white-space: nowrap;
  }
  .form-row button:hover { background: #d97006; }

  .form-note {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.55;
  }

  .success-msg {
    display: none;
    font-size: 17px;
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    padding: 13px 0;
    animation: up 0.5s ease both;
  }

  /* ── FOOTER ── */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 24px;
    margin-top: auto;
    animation: up 0.7s ease 0.3s both;
  }

  .footer-left {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .footer-right a {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    transition: color 0.18s;
  }
  .footer-right a:hover { color: var(--orange); }

  /* ── ANIMATION ── */
  @keyframes up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    body { padding: 24px 20px; }

    header {
      padding-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-tag { display: none; }
    .logo { font-size: 16px; }
    .nav-contact { font-size: 13px; }

    .image-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 3px;
      margin-top: 24px;
    }

    .coming-block {
      flex-direction: column;
      align-items: flex-start;
      gap: 32px;
      padding: 36px 0 36px;
    }

    h1 { font-size: clamp(52px, 14vw, 80px); flex-shrink: unset; }

    .signup { max-width: 100%; width: 100%; }
    .form-label { font-size: 12px; }
    .form-row input { font-size: 16px; padding: 14px 12px; }
    .form-row button { font-size: 12px; padding: 14px 16px; letter-spacing: 0.08em; }
    .form-note { font-size: 14px; line-height: 1.6; }
    .success-msg { font-size: 18px; }

    footer {
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
      padding-top: 20px;
    }
    .footer-left { font-size: 12px; line-height: 1.7; letter-spacing: 0.06em; }
    .footer-right a { font-size: 12px; }
  }
</style>
</head>
